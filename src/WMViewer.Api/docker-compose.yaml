services:
  postgres:
    container_name: "db.VMViewer"
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
       - POSTGRES_USER=dev
       - POSTGRES_PASSWORD=dev
       - POSTGRES_DB=dev
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d dev"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build:
      dockerfile: ./Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - CONNECTION_STRING=Host=postgres;Port=5432;Database=dev;Username=dev;Password=dev
volumes:
  postgres_data: